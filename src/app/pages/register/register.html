<div class="auth-page">
  <form class="auth-card" (ngSubmit)="register()">
    <h2>Create Account</h2>

    <label>
      Email
      <input
        type="email"
        name="email"
        [(ngModel)]="email"
        required
      />
    </label>

    <label>
      Password
      <input
        type="password"
        name="password"
        [(ngModel)]="password"
        minlength="6"
        required
      />
    </label>

    <p class="error" *ngIf="errorMessage">
      {{ errorMessage }}
    </p>

    <button type="submit">Create Account</button>

    <p>
      Already have an account?
      <a routerLink="/login">Log in</a>
    </p>
  </form>
</div>
